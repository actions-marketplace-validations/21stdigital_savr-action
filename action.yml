name: SAVR Action
description: GitHub Action that keeps draft releases ready so teams can publish manually from the GitHub Releases UI.
author: Fabian Pahl

# Add your action's branding here. This will appear on the GitHub Marketplace.
branding:
  icon: tag
  color: gray-dark

# Define your inputs here.
inputs:
  github-token:
    description: Token used for GitHub API authentication
    required: true
  tag-prefix:
    description: 'The prefix for version tags (default: v). Must be 20 characters or fewer and contain only letters, numbers, dots (.), hyphens (-), underscores (_), and slashes (/).'
    required: false
    default: 'v'
  release-branch:
    description: The branch to use for the release
    required: false
    default: 'main'
  dry-run:
    description: Boolean flag to simulate the process without creating or updating a release
    required: false
    default: 'false'
  release-notes-template:
    description: A template to format the generated release notes
    required: false
    # Keep this default in sync with src/templates.ts -> DEFAULT_TEMPLATE fallback.
    default: |
      {{#if features}}
      ### ✨ Features
      {{#each (groupByScope features)}}
      #### {{this.scope}}
      {{#each this.commits}}
      - {{this.subject}}
      {{/each}}

      {{/each}}
      {{/if}}

      {{#if fixes}}
      ### 🐛 Fixes
      {{#each (groupByScope fixes)}}
      #### {{this.scope}}
      {{#each this.commits}}
      - {{this.subject}}
      {{/each}}

      {{/each}}
      {{/if}}

      {{#if breaking}}
      ### 💥 Breaking Changes
      {{#each (groupByScope breaking)}}
      #### {{this.scope}}
      {{#each this.commits}}
      - {{this.subject}}
      {{/each}}

      {{/each}}
      {{/if}}
  initial-version:
    description: The initial version to start from
    required: false
    default: '1.0.0'

# Define your outputs here.
outputs:
  skipped:
    description: Whether release creation was skipped (true when dry-run, no version bump, or no new commits)
  dry-run:
    description: Whether the action ran in dry-run mode
  version:
    description: The calculated version for the release
  tag:
    description: The full tag name including prefix
  release-url:
    description: The URL of the created or updated draft release
  release-id:
    description: The ID of the created or updated draft release

runs:
  using: node24
  main: dist/index.js
