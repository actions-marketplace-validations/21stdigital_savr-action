# pnpm settings live here as of pnpm 10+/11 (the package.json "pnpm" field and several
# .npmrc keys such as save-exact / engine-strict are no longer read from those locations).

# Fail the install if the local Node version doesn't satisfy package.json "engines".
engineStrict: true

# Save exact dependency versions (no ^ ranges) when adding packages.
saveExact: true

# Dependencies permitted to run install/build scripts (pnpm blocks all others).
# pnpm 11 replaced onlyBuiltDependencies with this map (package matcher -> true|false).
allowBuilds:
  esbuild: true

# Dependency overrides pin transitive packages to non-vulnerable versions (CVE remediation).
# Blanket pins (no version selector) force every instance to a secure major; range-targeted
# pins only rewrite specs that fall inside a known-vulnerable window.
overrides:
  # @octokit chain (transitive via @actions/github)
  '@octokit/request-error@>=1.0.0 <5.1.1': '>=5.1.1'
  '@octokit/request@>=1.0.0 <8.4.1': '>=8.4.1'
  '@octokit/plugin-paginate-rest@>=1.0.0 <9.2.2': '>=9.2.2'
  # blanket pins to a secure major
  'undici': '^7.24.4'
  'fast-xml-parser': '^5.7.0'
  'vite': '^7.3.5'
  'lodash': '^4.18.1'
  'picomatch': '^4.0.4'
  'postcss': '^8.5.15'
  'js-yaml': '^4.2.0'
  # range-targeted CVE floors
  'minimatch@<3.1.4': '>=3.1.4'
  'rollup@>=4.0.0 <4.59.0': '>=4.59.0'
  'handlebars@<4.7.8': '>=4.7.8'
  'esbuild@<0.28.1': '>=0.28.1'
  'fast-uri@<3.1.2': '>=3.1.2'
  'fast-xml-builder@<1.1.7': '>=1.1.7'
  'brace-expansion@>=5.0.0 <5.0.6': '>=5.0.6'
