name: Rebuild dist/

on:
  pull_request_target:

permissions:
  actions: write
  contents: write

jobs:
  dist-rebuild:
    name: Rebuild dist/
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@v5
        name: Setup pnpm cache
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Check dist/ is up to date
        id: dist-check
        run: |
          if [ -n "$(git diff --name-only dist/)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit updated dist/
        if: steps.dist-check.outputs.changed == 'true'
        id: auto-commit
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'chore: rebuild dist/'
          file_pattern: 'dist/*'

      - name: Dispatch follow-up PR checks
        if: steps.dist-check.outputs.changed == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            const workflows = [
              {
                workflow_id: 'test.yml',
                inputs: {
                  pr_number: String(context.payload.pull_request.number),
                  head_sha: '${{ steps.auto-commit.outputs.commit_hash }}',
                },
              },
              {
                workflow_id: 'validate-pr.yml',
                inputs: {
                  pr_number: String(context.payload.pull_request.number),
                  pr_title: context.payload.pull_request.title,
                  head_sha: '${{ steps.auto-commit.outputs.commit_hash }}',
                },
              },
            ]

            for (const workflow of workflows) {
              await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: context.payload.pull_request.head.ref,
                workflow_id: workflow.workflow_id,
                inputs: workflow.inputs,
              })
            }
