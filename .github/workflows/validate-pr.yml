name: Validate Pull Request

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number for concurrency grouping
        required: false
        type: string
      pr_title:
        description: Pull request title to validate
        required: true
        type: string
      head_sha:
        description: PR head SHA to attach the check to
        required: true
        type: string

permissions:
  contents: read
  statuses: write

concurrency:
  group: validate-pr-${{ github.event.pull_request.number || inputs.pr_number || github.ref_name }}
  cancel-in-progress: true

jobs:
  validate_pr_title:
    name: workflows / Validate Pull Request Title
    runs-on: ubuntu-latest
    env:
      HEAD_SHA: ${{ github.event_name == 'workflow_dispatch' && inputs.head_sha || github.event.pull_request.head.sha }}
      PR_TITLE: ${{ github.event_name == 'workflow_dispatch' && inputs.pr_title || github.event.pull_request.title }}

    steps:
      - name: Set pending commit status
        if: github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: '${{ inputs.head_sha }}',
              state: 'pending',
              context: 'workflows / Validate Pull Request Title',
              description: 'Running...',
            });

      - uses: actions/checkout@v6
        with:
          ref: ${{ env.HEAD_SHA }}

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@v5
        name: Setup pnpm cache
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Validate Pull Request Title
        shell: bash
        run: printf '%s\n' "$PR_TITLE" | pnpm commitlint --verbose

      - name: Set final commit status
        if: always() && github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v9
        with:
          script: |
            const stateMap = { success: 'success', failure: 'failure', cancelled: 'error' };
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: '${{ inputs.head_sha }}',
              state: stateMap['${{ job.status }}'] || 'error',
              context: 'workflows / Validate Pull Request Title',
              description: '${{ job.status }}',
            });
