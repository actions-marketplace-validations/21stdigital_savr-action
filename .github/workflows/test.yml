name: Test

on:
  pull_request:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number for concurrency grouping
        required: false
        type: string
      head_sha:
        description: PR head SHA to validate
        required: true
        type: string

permissions:
  contents: read
  statuses: write

concurrency:
  group: test-${{ github.event.pull_request.number || inputs.pr_number || github.ref_name }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      HEAD_SHA: ${{ github.event_name == 'workflow_dispatch' && inputs.head_sha || github.event.pull_request.head.sha }}

    steps:
      - name: Set pending commit status
        if: github.event_name == 'workflow_dispatch'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: '${{ inputs.head_sha }}',
              state: 'pending',
              context: 'Test',
              description: 'Running...',
            });

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.HEAD_SHA }}

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        name: Setup pnpm cache
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      # Surface a rebuilt dist/ to the privileged commit-dist.yml workflow via an
      # artifact. This job has no write token, so it can safely run PR code; the
      # artifact is the only thing handed to the privileged side. See
      # docs/adr/0001-dist-rebuild-split-flow.md.
      - name: Check whether dist/ changed
        if: github.event_name == 'pull_request'
        id: dist-check
        run: |
          # --porcelain catches modified, deleted and untracked files, so a build
          # that removes or adds a dist/ file is detected, not just modifications.
          if [ -n "$(git status --porcelain -- dist/)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload rebuilt dist/
        if: github.event_name == 'pull_request' && steps.dist-check.outputs.changed == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-rebuild
          path: dist/
          retention-days: 1

      - name: Type check
        run: pnpm -s tsc --noEmit

      - name: Lint
        run: pnpm eslint . --max-warnings 0 --no-warn-ignored

      - name: Prettier check
        run: pnpm prettier --check .

      - name: Run tests
        run: pnpm test

      - name: Set final commit status
        if: always() && github.event_name == 'workflow_dispatch'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const stateMap = { success: 'success', failure: 'failure', cancelled: 'error' };
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: '${{ inputs.head_sha }}',
              state: stateMap['${{ job.status }}'] || 'error',
              context: 'Test',
              description: '${{ job.status }}',
            });
